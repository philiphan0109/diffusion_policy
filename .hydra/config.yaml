name: train_diffusion_transformer_hybrid
_target_: diffusion_policy.workspace.train_diffusion_transformer_hybrid_workspace.TrainDiffusionTransformerHybridWorkspace
task_name: ${task.name}
shape_meta: ${task.shape_meta}
exp_name: default
horizon: 10
n_obs_steps: 2
n_action_steps: 8
n_latency_steps: 0
dataset_obs_steps: ${n_obs_steps}
past_action_visible: false
keypoint_visible_rate: 1.0
obs_as_cond: true
policy:
  _target_: diffusion_policy.policy.diffusion_transformer_hybrid_image_policy.DiffusionTransformerHybridImagePolicy
  shape_meta: ${shape_meta}
  noise_scheduler:
    _target_: diffusers.schedulers.scheduling_ddim.DDIMScheduler
    num_train_timesteps: 100
    beta_start: 0.0001
    beta_end: 0.02
    beta_schedule: squaredcos_cap_v2
    clip_sample: true
    set_alpha_to_one: true
    steps_offset: 0
    prediction_type: epsilon
  horizon: ${horizon}
  n_action_steps: ${eval:'${n_action_steps}+${n_latency_steps}'}
  n_obs_steps: ${n_obs_steps}
  num_inference_steps: 8
  crop_shape:
  - 224
  - 224
  obs_encoder_group_norm: true
  eval_fixed_crop: true
  n_layer: 12
  n_cond_layers: 4
  n_head: 8
  n_emb: 512
  p_drop_emb: 0.0
  p_drop_attn: 0.3
  causal_attn: true
  time_as_cond: true
  obs_as_cond: ${obs_as_cond}
ema:
  _target_: diffusion_policy.model.diffusion.ema_model.EMAModel
  update_after_step: 0
  inv_gamma: 1.0
  power: 0.75
  min_value: 0.0
  max_value: 0.9999
dataloader:
  batch_size: 8
  num_workers: 4
  shuffle: true
  pin_memory: true
  persistent_workers: false
val_dataloader:
  batch_size: 8
  num_workers: 4
  shuffle: false
  pin_memory: true
  persistent_workers: false
optimizer:
  transformer_weight_decay: 0.001
  obs_encoder_weight_decay: 1.0e-06
  learning_rate: 0.0001
  betas:
  - 0.9
  - 0.95
training:
  device: cuda:0
  seed: 42
  debug: false
  resume: false
  lr_scheduler: cosine
  lr_warmup_steps: 1000
  num_epochs: 2000
  gradient_accumulate_every: 15
  use_ema: true
  rollout_every: null
  checkpoint_every: 10
  val_every: 50
  sample_every: 50
  max_train_steps: 500
  max_val_steps: null
  tqdm_interval_sec: 1.0
logging:
  project: diffusion_policy_bs128_ddim
  resume: false
  mode: offline
  name: ${now:%Y.%m.%d-%H.%M.%S}_${name}_${task_name}
  tags:
  - ${name}
  - ${task_name}
  - ${exp_name}
  id: null
  group: null
checkpoint:
  topk:
    monitor_key: test_mean_score
    mode: max
    k: 20
    format_str: epoch={epoch:04d}-test_mean_score={test_mean_score:.3f}.ckpt
  save_last_ckpt: true
  save_last_snapshot: false
multi_run:
  run_dir: data/outputs/${now:%Y.%m.%d}/${now:%H.%M.%S}_${name}_${task_name}
  wandb_name_base: ${now:%Y.%m.%d-%H.%M.%S}_${name}_${task_name}
task:
  name: single_task
  shape_meta:
    obs:
      robot0_agentview_right_image:
        shape:
        - 3
        - 256
        - 256
        type: rgb
        lerobot_keys:
        - video.robot0_agentview_right
      robot0_agentview_left_image:
        shape:
        - 3
        - 256
        - 256
        type: rgb
        lerobot_keys:
        - video.robot0_agentview_left
      robot0_eye_in_hand_image:
        shape:
        - 3
        - 256
        - 256
        type: rgb
        lerobot_keys:
        - video.robot0_eye_in_hand
      robot0_base_to_eef_pos:
        shape:
        - 3
        lerobot_keys:
        - state.end_effector_position_relative
      robot0_base_to_eef_quat:
        shape:
        - 4
        lerobot_keys:
        - state.end_effector_rotation_relative
      robot0_gripper_qpos:
        shape:
        - 2
        lerobot_keys:
        - state.gripper_qpos
      lang_emb:
        shape:
        - 768
    action:
      shape:
      - 12
      lerobot_keys:
      - action.end_effector_position
      - action.end_effector_rotation
      - action.gripper_close
      - action.base_motion
      - action.control_mode
  abs_action: false
  env_runner:
    _target_: diffusion_policy.env_runner.robomimic_image_runner.RobomimicImageRunner
    dataset_path: /mnt/amlfs-01/shared/robocasa_benchmark/robocasa-datasets/v1.0/train/atomic/CloseStandMixerHead/20250711/demo.hdf5
    shape_meta:
      obs:
        robot0_agentview_right_image:
          shape:
          - 3
          - 256
          - 256
          type: rgb
          lerobot_keys:
          - video.robot0_agentview_right
        robot0_agentview_left_image:
          shape:
          - 3
          - 256
          - 256
          type: rgb
          lerobot_keys:
          - video.robot0_agentview_left
        robot0_eye_in_hand_image:
          shape:
          - 3
          - 256
          - 256
          type: rgb
          lerobot_keys:
          - video.robot0_eye_in_hand
        robot0_base_to_eef_pos:
          shape:
          - 3
          lerobot_keys:
          - state.end_effector_position_relative
        robot0_base_to_eef_quat:
          shape:
          - 4
          lerobot_keys:
          - state.end_effector_rotation_relative
        robot0_gripper_qpos:
          shape:
          - 2
          lerobot_keys:
          - state.gripper_qpos
        lang_emb:
          shape:
          - 768
      action:
        shape:
        - 12
        lerobot_keys:
        - action.end_effector_position
        - action.end_effector_rotation
        - action.gripper_close
        - action.base_motion
        - action.control_mode
    n_train: 0
    n_train_vis: 1
    train_start_idx: 0
    n_test: 50
    n_test_vis: 4
    test_start_seed: 100000
    max_steps: 600
    n_obs_steps: ${n_obs_steps}
    n_action_steps: ${n_action_steps}
    render_obs_key: robot0_agentview_right_image
    fps: 10
    crf: 22
    past_action: ${past_action_visible}
    abs_action: false
    tqdm_interval_sec: 1.0
    n_envs: 1
    env_kwargs:
      seed: 1111111
      obj_instance_split: test
      style_ids: -2
      layout_ids: -2
      layout_and_style_ids: null
      clutter_mode: 0
      use_camera_obs: true
      use_object_obs: true
      camera_depths: false
      has_renderer: false
      has_offscreen_renderer: true
      camera_names:
      - robot0_agentview_left
      - robot0_agentview_right
      - robot0_eye_in_hand
      camera_widths: 256
      camera_heights: 256
      ignore_done: true
      reward_shaping: false
  dataset:
    _target_: diffusion_policy.dataset.lerobot_dataset.LerobotCotrainingDataset
    shape_meta:
      obs:
        robot0_agentview_right_image:
          shape:
          - 3
          - 256
          - 256
          type: rgb
          lerobot_keys:
          - video.robot0_agentview_right
        robot0_agentview_left_image:
          shape:
          - 3
          - 256
          - 256
          type: rgb
          lerobot_keys:
          - video.robot0_agentview_left
        robot0_eye_in_hand_image:
          shape:
          - 3
          - 256
          - 256
          type: rgb
          lerobot_keys:
          - video.robot0_eye_in_hand
        robot0_base_to_eef_pos:
          shape:
          - 3
          lerobot_keys:
          - state.end_effector_position_relative
        robot0_base_to_eef_quat:
          shape:
          - 4
          lerobot_keys:
          - state.end_effector_rotation_relative
        robot0_gripper_qpos:
          shape:
          - 2
          lerobot_keys:
          - state.gripper_qpos
        lang_emb:
          shape:
          - 768
      action:
        shape:
        - 12
        lerobot_keys:
        - action.end_effector_position
        - action.end_effector_rotation
        - action.gripper_close
        - action.base_motion
        - action.control_mode
    dataset_soup: null
    dataset_paths:
    - /media/alfredo/X9 Pro/robocasa/v1.0/pretrain/atomic/CloseFridge/20250819/lerobot
    horizon: ${horizon}
    pad_before: ${eval:'${n_obs_steps}-1+${n_latency_steps}'}
    pad_after: ${eval:'${n_action_steps}-1'}
    n_obs_steps: ${dataset_obs_steps}
    abs_action: false
    rotation_rep: rotation_6d
    use_legacy_normalizer: false
    use_cache: true
    seed: 42
    val_ratio: 0.02
